main = "worker/index.js"
name = "english-flashcards"
compatibility_date = "2026-04-07"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "__D1_DATABASE_NAME__"
database_id = "__D1_DATABASE_ID__"

[vars]
RESEND_FROM_EMAIL = "__RESEND_FROM_EMAIL__"
RESEND_API_KEY = "__RESEND_API_KEY__"
SESSION_SECRET = "__SESSION_SECRET__"
LOGIN_CODE_TTL_SECONDS = "600"
LOGIN_CODE_SEND_INTERVAL_SECONDS = "60"
SESSION_TTL_SECONDS = "2592000"

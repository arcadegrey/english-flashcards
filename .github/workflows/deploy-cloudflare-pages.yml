name: Deploy To Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Build-time public vars for Vite
      VITE_KOKORO_TTS_URL: ${{ secrets.VITE_KOKORO_TTS_URL }}
      VITE_API_BASE: /api
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Required Secrets
        run: |
          set -e
          [ -n "$CLOUDFLARE_API_TOKEN" ] || (echo "Missing secret: CF_API_TOKEN" && exit 1)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || (echo "Missing secret: CF_ACCOUNT_ID" && exit 1)
          [ -n "$D1_DATABASE_ID" ] || (echo "Missing secret: D1_DATABASE_ID" && exit 1)
          [ -n "$D1_DATABASE_NAME" ] || (echo "Missing secret: D1_DATABASE_NAME" && exit 1)
          [ -n "$RESEND_API_KEY" ] || (echo "Missing secret: RESEND_API_KEY" && exit 1)
          [ -n "$RESEND_FROM_EMAIL" ] || (echo "Missing secret: RESEND_FROM_EMAIL" && exit 1)
          [ -n "$SESSION_SECRET" ] || (echo "Missing secret: SESSION_SECRET" && exit 1)

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Wrangler CLI
        run: npm i -g wrangler@4

      - name: Inject Deploy-Time Vars
        run: |
          node --input-type=module -e '
            import fs from "node:fs";
            const escapeTomlString = (value) =>
              String(value).replace(/\\/g, "\\\\").replace(/"/g, "\\\"");
            const replacements = {
              "__D1_DATABASE_ID__": process.env.D1_DATABASE_ID,
              "__D1_DATABASE_NAME__": process.env.D1_DATABASE_NAME,
              "__RESEND_API_KEY__": process.env.RESEND_API_KEY,
              "__RESEND_FROM_EMAIL__": process.env.RESEND_FROM_EMAIL,
              "__SESSION_SECRET__": process.env.SESSION_SECRET,
            };
            let content = fs.readFileSync("wrangler.toml", "utf8");
            for (const [placeholder, value] of Object.entries(replacements)) {
              if (!value) throw new Error(`Missing value for ${placeholder}`);
              content = content.replaceAll(placeholder, escapeTomlString(value));
            }
            fs.writeFileSync("wrangler.toml", content);
          '

      - name: Apply D1 Schema
        run: |
          set -euo pipefail
          npm run d1:migrate

      - name: Deploy To Cloudflare Worker
        run: |
          set -euo pipefail
          echo "Deploying Worker + static assets with wrangler.toml"
          wrangler deploy

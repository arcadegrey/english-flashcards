name: Deploy To Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Build-time public vars for Vite
      VITE_KOKORO_TTS_URL: ${{ secrets.VITE_KOKORO_TTS_URL }}
      VITE_CLOUDBASE_ENV_ID: ${{ secrets.VITE_CLOUDBASE_ENV_ID }}
      VITE_CLOUDBASE_REGION: ${{ secrets.VITE_CLOUDBASE_REGION }}
      VITE_CLOUDBASE_PUBLISHABLE_KEY: ${{ secrets.VITE_CLOUDBASE_PUBLISHABLE_KEY }}
      VITE_CLOUDBASE_PROGRESS_COLLECTION: ${{ secrets.VITE_CLOUDBASE_PROGRESS_COLLECTION }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Required Secrets
        run: |
          set -e
          [ -n "$CLOUDFLARE_API_TOKEN" ] || (echo "Missing secret: CF_API_TOKEN" && exit 1)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || (echo "Missing secret: CF_ACCOUNT_ID" && exit 1)
          [ -n "$VITE_CLOUDBASE_ENV_ID" ] || (echo "Missing secret: VITE_CLOUDBASE_ENV_ID" && exit 1)
          [ -n "$VITE_CLOUDBASE_REGION" ] || (echo "Missing secret: VITE_CLOUDBASE_REGION" && exit 1)
          [ -n "$VITE_CLOUDBASE_PUBLISHABLE_KEY" ] || (echo "Missing secret: VITE_CLOUDBASE_PUBLISHABLE_KEY" && exit 1)
          [ -n "$VITE_CLOUDBASE_PROGRESS_COLLECTION" ] || (echo "Missing secret: VITE_CLOUDBASE_PROGRESS_COLLECTION" && exit 1)

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Wrangler CLI
        run: npm i -g wrangler@4

      - name: Deploy To Cloudflare Worker
        run: |
          set -euo pipefail
          echo "Deploying Worker + static assets with wrangler.toml"
          wrangler deploy
